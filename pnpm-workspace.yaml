packages:
  - 'apps/*'
  - 'packages/*'

# Форсим патч valibot (ReDoS в EMOJI_REGEX — GHSA-vqpr-j7v3-hqw9): @telegram-apps/sdk
# пинит valibot 1.0.0 (в уязвимом диапазоне >=0.31.0 <1.2.0). 1.0.0 → ^1.2.0 — minor
# в пределах 1.x, API-совместимо. Точечно по valibot@1.0.0, чтобы не задеть
# 1.0.0-beta.14 (@telegram-apps/transformers), которого уязвимость не касается.
overrides:
  valibot@1.0.0: ^1.2.0

catalogs:
  build:
    '@intlify/unplugin-vue-i18n': ^11.2.4
    '@shikijs/markdown-it': ^4.3.1
    '@unocss/eslint-config': ^66.7.4
    '@vitejs/plugin-vue': ^6.0.4
    axios: ^1.16.1
    beasties: ^0.4.1
    markdown-it-link-attributes: ^4.0.1
    unocss: ^66.7.4
    unplugin-auto-import: ^21.0.0
    unplugin-vue-components: ^32.1.0
    unplugin-vue-macros: ^2.14.5
    # held <32: v32 переходит на markdown-exit → ломает типы markdownItSetup
    # в apps/web/vite.config.ts (link-attributes + @shikijs/markdown-it на markdown-it)
    unplugin-vue-markdown: ^29.2.0
    vite: ^8.1.3
    vite-plugin-pwa: ^1.2.0
    vite-plugin-vue-devtools: ^8.1.5
    vite-plugin-vue-layouts: ^0.11.0
    vite-ssg: ^28.3.0
    vite-ssg-sitemap: ^0.10.0

  dev:
    '@antfu/eslint-config': ^9.1.0
    '@iconify-json/mdi': ^1.2.3
    '@vue-macros/volar': ^3.1.2
    '@vue/test-utils': ^2.4.6
    cypress: ^15.10.0
    cypress-vite: ^1.8.0
    eslint: ^10.0.2
    eslint-plugin-cypress: ^6.1.0
    eslint-plugin-format: ^2.0.1
    jsdom: ^29.1.1
    lint-staged: ^17.0.8
    simple-git-hooks: ^2.13.1
    taze: ^19.9.2
    # held <6: TS 6 роняет vue-tsc typecheck (не готов) — ждём поддержки в vue-tsc
    typescript: ^5.8.2
    vitest: ^4.0.18
    vue-tsc: ^3.3.6

  frontend:
    '@telegram-apps/sdk': ^3.11.8
    # held <3: v3 теряет per-page SSG-<title> (vite-ssg@28 рендерит head своим unhead v2)
    '@unhead/vue': ^2.1.7
    '@unocss/preset-web-fonts': ^66.7.4
    '@unocss/reset': ^66.7.4
    '@vueuse/core': ^14.2.1
    mapbox-gl: ^3.24.0
    maska: ^3.2.0
    nprogress: ^0.2.0
    pinia: ^3.0.4
    qrcode: ^1.5.4
    reka-ui: ^2.9.0
    vue: ^3.5.29
    vue-i18n: ^11.1.3
    vue-router: ^5.0.3

  types:
    '@types/markdown-it-link-attributes': ^3.0.5
    '@types/node': ^26.1.0
    '@types/nprogress': ^0.2.3
    '@types/qrcode': ^1.5.5
