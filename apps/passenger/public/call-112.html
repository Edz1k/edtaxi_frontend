<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вызов 112</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #0b1620;
        color: #fff;
        font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
        padding: 24px;
        box-sizing: border-box;
      }
      .icon {
        font-size: 56px;
      }
      h1 {
        font-size: 22px;
        margin: 0;
      }
      p {
        color: #94a3b8;
        font-size: 14px;
        margin: 0;
        line-height: 1.5;
      }
      a.call {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: 320px;
        height: 60px;
        border-radius: 18px;
        background: #ef4444;
        color: #fff;
        font-size: 20px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="icon">🚨</div>
    <h1>Экстренный вызов 112</h1>
    <p>Открываем набор номера…<br />Если звонилка не открылась сама — нажмите кнопку.</p>
    <a class="call" href="tel:112">Позвонить 112</a>
    <script>
      // Telegram-вебвью блокирует tel: внутри мини-аппа, поэтому кнопка
      // «Безопасность» открывает ЭТУ страницу во внешнем браузере, где tel:
      // работает. Пытаемся набрать сразу; кнопка выше — страховка, если
      // браузер требует явный тап для tel:-перехода.
      setTimeout(function () {
        window.location.href = 'tel:112'
      }, 300)
    </script>
  </body>
</html>
