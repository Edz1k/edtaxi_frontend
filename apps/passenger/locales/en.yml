about:
  tagline: Kazakhstani taxi — fast, fair, safe
  why: Why Telegram Taxi
  tariffs: Tariffs
  tariffsNote: The exact price is calculated for your route and shown before you confirm the order.
  madeIn: Made in Kazakhstan 🇰🇿
  adv:
    priceTitle: Fair price, no surprises
    priceText: You see the price before ordering. Our fee is lower than big aggregators’, so drivers earn more and arrive faster.
    driversTitle: Verified drivers
    driversText: Every driver’s documents, car and photo are checked before they can take orders. See the “Safety” section.
    bonusTitle: Bonuses for every ride
    bonusText: Ride and collect bonuses, invite friends with your code and join promotions — all in the “Bonuses” section.
    supportTitle: Real in-app support
    supportText: Not a scripted bot — real people. Write to the support chat and we’ll sort it out.
    localTitle: A Kazakhstani service
    localText: Telegram Taxi is built in Kazakhstan for Kazakhstan — we know our cities, work in tenge, and the money stays in the country.
