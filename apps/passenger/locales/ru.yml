    bonusText: Катайтесь и копите бонусы, приглашайте друзей по своему коду и участвуйте в акциях — всё в разделе «Бонусы».
    supportTitle: Живая поддержка в приложении
    supportText: 'Не бот по скриптам, а реальные люди: напишите в чат поддержки — ответим и решим вопрос.'
    localTitle: Казахстанский сервис
    localText: 'Telegram Taxi создан в Казахстане для Казахстана: мы знаем свои города, работаем в тенге, и деньги остаются в стране.'
