about:
  tagline: Казахстанское такси — быстро, честно, безопасно
  why: Почему Telegram Taxi
  tariffs: Тарифы
  tariffsNote: Точная стоимость рассчитывается по маршруту и показывается до подтверждения заказа.
  madeIn: Сделано в Казахстане 🇰🇿
  adv:
    priceTitle: Честная цена без сюрпризов
    priceText: Стоимость видна до заказа. Комиссия сервиса ниже, чем у крупных агрегаторов, — водители зарабатывают больше и приезжают охотнее.
    driversTitle: Проверенные водители
    driversText: Документы, автомобиль и фото каждого водителя проверяются до допуска к заказам. Подробнее — в разделе «Безопасность».
    bonusTitle: Бонусы за каждую поездку
    bonusText: Катайтесь и копите бонусы, приглашайте друзей по своему коду и участвуйте в акциях — всё в разделе «Бонусы».
    supportTitle: Живая поддержка в приложении
    supportText: 'Не бот по скриптам, а реальные люди: напишите в чат поддержки — ответим и решим вопрос.'
    localTitle: Казахстанский сервис
    localText: 'Telegram Taxi создан в Казахстане для Казахстана: мы знаем свои города, работаем в тенге, и деньги остаются в стране.'
