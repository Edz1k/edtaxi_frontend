<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 128">
  <defs>
    <linearGradient id="van-body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3c5064"/>
      <stop offset="0.28" stop-color="#5f7a92"/>
      <stop offset="0.5" stop-color="#7590a8"/>
      <stop offset="0.72" stop-color="#5f7a92"/>
      <stop offset="1" stop-color="#3c5064"/>
    </linearGradient>
    <linearGradient id="van-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#242c38"/>
      <stop offset="1" stop-color="#10151d"/>
    </linearGradient>
  </defs>
  <!-- колёса -->
  <g fill="#171b22">
    <rect x="1.5" y="25" width="8" height="21" rx="4"/>
    <rect x="50.5" y="25" width="8" height="21" rx="4"/>
    <rect x="1.5" y="86" width="8" height="21" rx="4"/>
    <rect x="50.5" y="86" width="8" height="21" rx="4"/>
  </g>
  <!-- кузов: коробчатый, почти без сужения -->
  <path d="M30 2.5C19 2.5 10.5 6 9 14.5 8.2 19 8 24 8 30v70c0 5.6.2 10.2 1 14.3 1.6 8 10 11.2 21 11.2s19.4-3.2 21-11.2c.8-4.1 1-8.7 1-14.3V30c0-6-.2-11-1-15.5C49.5 6 41 2.5 30 2.5Z" fill="url(#van-body)" stroke="#33454f" stroke-width="1.6"/>
  <!-- капот: короткий -->
  <path d="M30 7c7.5 0 13.5 1.8 16 5.8-4.5-1.8-9.8-2.7-16-2.7s-11.5.9-16 2.7c2.5-4 8.5-5.8 16-5.8Z" fill="#fff" opacity="0.25"/>
  <!-- фары -->
  <path d="M12.5 7c2-1.5 4.6-2.6 7.5-3.2l1.7 4.4c-2.9.5-5.4 1.3-7.6 2.5Z" fill="#f4f9ff" opacity="0.85"/>
  <path d="M47.5 7c-2-1.5-4.6-2.6-7.5-3.2l-1.7 4.4c2.9.5 5.4 1.3 7.6 2.5Z" fill="#f4f9ff" opacity="0.85"/>
  <!-- зеркала -->
  <path d="M8 36c-3.2.3-5 1.6-5 3.8 0 2 1.4 3 4.2 3l.8-.1Z" fill="#4a5d70"/>
  <path d="M52 36c3.2.3 5 1.6 5 3.8 0 2-1.4 3-4.2 3l-.8-.1Z" fill="#4a5d70"/>
  <!-- лобовое стекло: крутое, близко к капоту -->
  <path d="M13 25c3.8-4.6 9.6-6.8 17-6.8s13.2 2.2 17 6.8l-2.2 11.6c-9.2-3.6-20.4-3.6-29.6 0Z" fill="url(#van-glass)"/>
  <!-- длинная крыша салона -->
  <rect x="13.5" y="40" width="33" height="62" rx="8.5" fill="#87a0b4"/>
  <!-- боковые окна салона: длинные -->
  <rect x="10.2" y="42" width="3.8" height="56" rx="1.9" fill="#10151d" opacity="0.85"/>
  <rect x="46" y="42" width="3.8" height="56" rx="1.9" fill="#10151d" opacity="0.85"/>
  <!-- рейлинги на крыше -->
  <rect x="17.5" y="45" width="2.5" height="52" rx="1.25" fill="#33454f" opacity="0.8"/>
  <rect x="40" y="45" width="2.5" height="52" rx="1.25" fill="#33454f" opacity="0.8"/>
  <!-- заднее стекло -->
  <path d="M15 105c8.6 3.6 21.4 3.6 30 0l1.8 9.4c-10.6 4-23 4-33.6 0Z" fill="url(#van-glass)" opacity="0.95"/>
  <!-- задние фонари -->
  <path d="M11.5 121c2.3 1.5 5.1 2.5 8.3 3.1l1.3-4.4c-3.1-.5-5.9-1.4-8.3-2.7Z" fill="#d64438"/>
  <path d="M48.5 121c-2.3 1.5-5.1 2.5-8.3 3.1l-1.3-4.4c3.1-.5 5.9-1.4 8.3-2.7Z" fill="#d64438"/>
