  eyebrow: Investment Token
  title: TAXI Token - кратко для инвесторов
  description: 'TAXI - утилити-токен в сети BNB Smart Chain (BEP-20). Общая эмиссия: 7,000,000,000 TAXI. Токен используется для поощрений водителей, программ лояльности пассажиров, реферальных вознаграждений, скидок и маркетинговых кампаний. Минтинг отключён после деплоя; возможна политика сжигания по решению компании.'
  issuerLabel: Issuer
