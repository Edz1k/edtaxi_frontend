  description: 'Telegram Taxi Telegram Mini App арқылы сапарға тапсырыс берудің ақылы қызметін ұсынады. Әр сапардың құны тапсырыс рәсімделгенге дейін есептеліп, қосымшада көрсетіледі — сіз нақты бағаны біліп тұрып тапсырысты растайсыз.'
