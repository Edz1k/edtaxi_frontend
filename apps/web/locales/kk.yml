  minivan: Минивэн
  minivanText: Үлкен топтар мен жүкке арналған — 7 орынға дейін
  pricingTitle: Құн қалай есептеледі
  pricingText: 'Сапар бағасы таңдалған санат тарифінен (отырғызу, километр мен минут құны), маршруттың ұзындығы мен ұзақтығынан құралады. Ақылы опциялар — балалар креслосы және жануарды тасымалдау — белгіленген қосымша ақымен қосылады. Қорытынды құн тапсырысты растағанға дейін көрсетіледі; барлық есеп айырысу — теңгемен (KZT).'
  stepsTitle: Тапсырыс пен төлем қалай өтеді
  step1Title: Mini App ашыңыз
  step1Text: Telegram Taxi-ді тікелей Telegram ішінде іске қосыңыз — бөлек қосымша орнатудың қажеті жоқ.
  step2Title: Маршрутты көрсетіңіз
  step2Text: Жеткізу және баратын мекенжайларды, сапар санатын таңдаңыз — қосымша нақты құнды бірден көрсетеді.
  step3Title: Төлем әдісін таңдаңыз
  step3Text: Visa немесе Mastercard банк картасы, Apple Pay, Google Pay немесе жүргізушіге қолма-қол ақша.
  step4Title: Тапсырысты растаңыз
  step4Text: Онлайн-төлем 3-D Secure қолдауымен қорғалған Freedom Pay сервисі арқылы өтеді. Карта деректері біздің жағымызда сақталмайды.
  paymentsTitle: Төлемге қабылдаймыз
  paymentsNote: 'Онлайн-төлемдерді Freedom Pay төлем провайдері өңдейді (3-D Secure, PCI DSS). Сапар құнының 50%-ына дейін бонуспен төлеуге болады.'
  docsNote: 'Тапсырыс рәсімдей отырып, сіз оферта талаптарын қабылдайсыз:'
