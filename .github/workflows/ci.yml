name: CI

on:
  pull_request:
    branches: [main]

# Отменяем предыдущий прогон для той же PR-ветки при новом пуше — не жжём раннеры.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: 10.30.2

jobs:
  # Единый гейт качества (см. quality.yml) — тот же, что гейтит деплой.
  quality:
    uses: ./.github/workflows/quality.yml

  # Проверяем, что каждое приложение реально собирается (vite-сборка ловит то,
  # что не видят lint/typecheck: резолв компонентов, unocss, defineModel и т.п.).
  build:
    name: Build ${{ matrix.label }}
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # label совпадает с именами job'ов в deploy.yml ("Build Driver" и т.п.),
        # чтобы required-чеки в branch protection матчились и на PR, и на push.
        include:
          - {app: passenger, label: Passenger}
          - {app: driver, label: Driver}
          - {app: web, label: Web}
          - {app: share, label: Share}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.label }}
        run: pnpm --filter @edtaxi/${{ matrix.app }} build
        env:
          VITE_API_URL: /api/v1
          VITE_WS_URL: wss://ws.telegramtaxi.kz
          VITE_SHARE_URL: https://share.telegramtaxi.kz
          VITE_MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

  # Аудит зависимостей: блокирует только на critical (must-fix). High/moderate
  # печатаются в логах, но не рушат PR — чтобы неисправимые транзитивные advisory
  # не стопорили работу; следить за ними лучше через Dependabot (dependabot.yml).
  # `pnpm audit` больше не работает: npm отключил старые аудит-эндпоинты (410),
  # поэтому advisories спрашивает наш скрипт напрямую через bulk-эндпоинт
  # (scripts/audit.mjs, нужен только Node и pnpm-lock.yaml — без install).
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit (critical blocks; high+ shown in logs)
        run: node scripts/audit.mjs --audit-level=critical
