version: 2
updates:
  # Обновления зависимостей (npm-экосистема покрывает pnpm-lock). Систематически
  # закрывает advisory-бэклог, который CI-аудит только показывает.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Группируем мелкие апдейты в один PR, чтобы не плодить шум.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Мажоры НЕ автоматизируем ботом — они регулярно ломают тихо: typescript 6
      # роняет vue-tsc; @unhead/vue 3 теряет per-page SSG-<title> при vite-ssg@28;
      # vite 8 рискует плагинами. Их поднимаем осознанно и пакетно вручную (в repo
      # есть `taze`: pnpm dlx taze major), а бот держит только безопасные
      # minor/patch. Security-апдейты (GitHub Dependabot security) идут отдельно.
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  # Держим версии GitHub Actions свежими (checkout/setup-node/action-setup).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
