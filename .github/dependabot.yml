version: 2
updates:
  # Обновления зависимостей (npm-экосистема покрывает pnpm-lock). Систематически
  # закрывает advisory-бэклог, который CI-аудит только показывает.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Группируем мелкие апдейты в один PR, чтобы не плодить шум.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # @unhead/vue v3 несовместим с vite-ssg@28: SSG рендерит <head> своим
      # unhead v2, поэтому per-page useHead-заголовки теряются (проверено —
      # сборка проходит, но в SSG-HTML у всех страниц дефолтный <title>).
      # Держим v2 до апгрейда vite-ssg с поддержкой unhead v3.
      - dependency-name: '@unhead/vue'
        update-types: ['version-update:semver-major']

  # Держим версии GitHub Actions свежими (checkout/setup-node/action-setup).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
